name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/tesla_suc_pricing/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/tesla_suc_pricing/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog release notes
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import sys

          version = os.environ["VERSION"]
          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()

          start = None
          for index, line in enumerate(lines):
              if line.startswith(f"## [{version}]"):
                  start = index
                  break

          if start is None:
              print(f"Could not find changelog section for version {version}", file=sys.stderr)
              sys.exit(1)

          end = len(lines)
          for index in range(start + 1, len(lines)):
              if lines[index].startswith("## ["):
                  end = index
                  break

          section = "\n".join(lines[start:end]).strip()
          if not section:
              print(f"Changelog section for version {version} is empty", file=sys.stderr)
              sys.exit(1)

          Path("release-notes.md").write_text(section + "\n", encoding="utf-8")
          PY

      - name: Create Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output result
        run: |
          if [ "${{ steps.tag_check.outputs.exists }}" == "true" ]; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release creation"
          else
            echo "Created release for version ${{ steps.version.outputs.version }}"
          fi
